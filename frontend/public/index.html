<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    
    <!-- ✅ Favicon (ನಿಮ್ಮ dolphin logo) -->
    <link rel="icon" href="%PUBLIC_URL%/dolphin.jpg" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    
    <!-- ✅ PWA Theme Color -->
    <meta name="theme-color" content="#1a6cff" />
    
    <!-- ✅ PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Dolphin Trends" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/dolphin.jpg" />
    
    <!-- ✅ PWA Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <!-- ✅ SEO Meta Tags -->
    <title>Dolphin Trends | Women's Fashion Store Bangalore</title>
    <meta name="description" content="Dolphin Trends - Best women's fashion store in Rajgopal Nagar, Peenya, Bangalore. Explore Kurtas, Leggings, and Premium Dresses at affordable prices." />
    <meta name="keywords" content="Dolphin Trends, Dolphin Trends Bangalore, Women's fashion Peenya, Laggere boutique, Kurtas Peenya, Dress shop Rajgopal Nagar, Jeevan JD" />
    <meta name="author" content="Jeevan JD" />
    
    <!-- ✅ Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="🐬 Dolphin Trends | Women's Fashion Store" />
    <meta property="og:description" content="Explore our daily new arrivals and exclusive boutique collections! 🛍️" />
    <meta property="og:image" content="https://dolphin-trends-two.vercel.app/logo-preview.jpg" />
    <meta property="og:url" content="https://dolphin-trends-two.vercel.app" />
    <meta property="og:site_name" content="Dolphin Trends" />
    
    <!-- ✅ Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="🐬 Dolphin Trends | Women's Fashion Store" />
    <meta name="twitter:description" content="Explore our daily new arrivals and exclusive boutique collections! 🛍️" />
    <meta name="twitter:image" content="https://dolphin-trends-two.vercel.app/logo-preview.jpg" />
    
    <!-- ✅ Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('%PUBLIC_URL%/sw.js')
            .then(reg => console.log('✅ Dolphin Trends PWA Registered!', reg.scope))
            .catch(err => console.log('❌ PWA Error:', err));
        });
      }
    </script>
    
    <style>
      /* ✅ Loading screen (splash) */
      body {
        margin: 0;
        background: #0b1329;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      
      /* ✅ Splash screen */
      #splash {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #0b1329;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }
      
      #splash img {
        width: 120px;
        height: 120px;
        border-radius: 24px;
        animation: pulse 1.5s infinite;
      }
      
      #splash p {
        margin-top: 20px;
        color: #4d9fff;
        font-size: 1.2rem;
        font-weight: bold;
      }
      
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.05); opacity: 0.8; }
      }
    </style>
  </head>
  <body>
    <!-- ✅ Splash Screen (App launch ನಲ್ಲಿ ಕಾಣಿಸುತ್ತದೆ) -->
    <div id="splash">
      <img src="%PUBLIC_URL%/dolphin.jpg" alt="Dolphin Trends" />
      <p>🐬 Dolphin Trends</p>
    </div>
    
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    
    <!-- ✅ Splash screen hide ಮಾಡಿ, app load ಆದ ಮೇಲೆ -->
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const splash = document.getElementById('splash');
          if (splash) {
            splash.style.opacity = '0';
            setTimeout(() => splash.remove(), 500);
          }
        }, 1000);
      });
    </script>
  </body>
</html>
