<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    
    <!-- ✅ Favicon -->
    <link rel="icon" href="%PUBLIC_URL%/dolphin.jpg" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    
    <!-- ✅ PWA Theme Color -->
    <meta name="theme-color" content="#1a6cff" />
    
    <!-- ✅ PWA Meta Tags (FIXED) -->
    <meta name="mobile-web-app-capable" content="yes" />  <!-- ✅ FIXED! -->
    <meta name="apple-mobile-web-app-capable" content="yes" />  <!-- Keep both for iOS -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Dolphin Trends" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/dolphin.jpg" />
    
    <!-- ✅ PWA Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <!-- ✅ SEO Meta Tags -->
    <title>Dolphin Trends | Women's Fashion Store Bangalore</title>
    <meta name="description" content="Dolphin Trends - Best women's fashion store in Rajgopal Nagar, Peenya, Bangalore." />
    <meta name="keywords" content="Dolphin Trends, Women's fashion Peenya, Laggere boutique" />
    <meta name="author" content="Jeevan JD" />
    
    <!-- ✅ Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="🐬 Dolphin Trends | Women's Fashion Store" />
    <meta property="og:description" content="Explore our daily new arrivals and exclusive boutique collections!" />
    <meta property="og:image" content="https://dolphin-trends-two.vercel.app/logo-preview.jpg" />
    <meta property="og:url" content="https://dolphin-trends-two.vercel.app" />
    <meta property="og:site_name" content="Dolphin Trends" />
    
    <!-- ✅ Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="🐬 Dolphin Trends | Women's Fashion Store" />
    <meta name="twitter:description" content="Explore our daily new arrivals!" />
    <meta name="twitter:image" content="https://dolphin-trends-two.vercel.app/logo-preview.jpg" />
    
    <!-- ✅ Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('%PUBLIC_URL%/sw.js')
            .then(reg => console.log('✅ Dolphin Trends PWA Registered!', reg.scope))
            .catch(err => console.log('❌ PWA Error:', err));
        });
      }
    </script>
    
    <style>
      body {
        margin: 0;
        background: #0b1329;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      
      #splash {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: #0b1329;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }
      
      #splash img {
        width: 120px;
        height: 120px;
        border-radius: 24px;
        animation: pulse 1.5s infinite;
      }
      
      #splash p {
        margin-top: 20px;
        color: #4d9fff;
        font-size: 1.2rem;
        font-weight: bold;
      }
      
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.05); opacity: 0.8; }
      }
      
      @keyframes slideUp {
        from { transform: translateY(20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <img src="%PUBLIC_URL%/dolphin.jpg" alt="Dolphin Trends" />
      <p>🐬 Dolphin Trends</p>
    </div>
    
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const splash = document.getElementById('splash');
          if (splash) {
            splash.style.opacity = '0';
            setTimeout(() => splash.remove(), 500);
          }
        }, 1000);
      });
    </script>

    <!-- Install App Popup -->
    <script>
      let deferredPrompt = null;

      window.addEventListener('beforeinstallprompt', (e) => {
        console.log('📱 Install prompt available');
        e.preventDefault();
        deferredPrompt = e;
        
        setTimeout(() => {
          showInstallPopup();
        }, 3000);
      });

      function showInstallPopup() {
        if (window.matchMedia('(display-mode: standalone)').matches) {
          return;
        }
        
        if (localStorage.getItem('install_popup_dismissed') === new Date().toDateString()) {
          return;
        }
        
        if (document.getElementById('install-popup')) {
          return;
        }

        const popup = document.createElement('div');
        popup.id = 'install-popup';
        popup.innerHTML = `
          <div style="
            position: fixed; 
            bottom: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: linear-gradient(135deg, #0f1a35, #0b1329); 
            border: 2px solid #1a6cff; 
            border-radius: 16px; 
            padding: 20px; 
            max-width: 420px; 
            width: 92%; 
            z-index: 99999; 
            box-shadow: 0 10px 40px rgba(26, 108, 255, 0.4);
            animation: slideUp 0.5s ease-out;
          ">
            <div style="display: flex; align-items: flex-start; gap: 15px; margin-bottom: 15px;">
              <img src="%PUBLIC_URL%/dolphin.jpg" alt="Dolphin Trends" style="width: 60px; height: 60px; border-radius: 12px; flex-shrink: 0;" />
              <div style="flex: 1; min-width: 0;">
                <h3 style="margin: 0 0 5px 0; color: #fff; font-size: 1.05rem; font-weight: bold;">
                  📱 Install Dolphin Trends App
                </h3>
                <p style="margin: 0; color: #7a85a0; font-size: 0.82rem; line-height: 1.4;">
                  Get faster access, offline browsing & exclusive offers! 🎁
                </p>
              </div>
              <button onclick="closeInstallPopup()" aria-label="Close" style="
                background: rgba(255,255,255,0.05); 
                border: none; 
                color: #7a85a0; 
                font-size: 1.3rem; 
                cursor: pointer; 
                padding: 4px 8px; 
                line-height: 1; 
                border-radius: 6px;
                flex-shrink: 0;
              ">✕</button>
            </div>
            <div style="display: flex; gap: 8px;">
              <button onclick="installApp()" style="
                flex: 1; 
                background: linear-gradient(135deg, #1a6cff, #004ecc); 
                color: #fff; 
                border: none; 
                padding: 12px; 
                border-radius: 10px; 
                font-weight: bold; 
                cursor: pointer; 
                font-size: 0.95rem;
                box-shadow: 0 4px 15px rgba(26, 108, 255, 0.3);
              ">
                📲 Install Now
              </button>
              <button onclick="closeInstallPopup()" style="
                background: rgba(255,255,255,0.08); 
                color: #fff; 
                border: 1px solid rgba(255,255,255,0.1); 
                padding: 12px 18px; 
                border-radius: 10px; 
                cursor: pointer; 
                font-size: 0.85rem;
              ">
                Later
              </button>
            </div>
            <p style="margin: 10px 0 0 0; color: #4d9fff; font-size: 0.72rem; text-align: center;">
              ✨ No download needed • Instant install • Free forever
            </p>
          </div>
        `;
        
        document.body.appendChild(popup);
        console.log('📱 Install popup shown');
      }

      async function installApp() {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          console.log(`User ${outcome} the install prompt`);
          deferredPrompt = null;
        } else {
          alert('📱 Install ಮಾಡಲು:\n\nChrome menu (⋮) → "Add to Home Screen" / "Install App"\n\niPhone: Safari → Share → Add to Home Screen');
        }
        closeInstallPopup();
      }

      function closeInstallPopup() {
        const popup = document.getElementById('install-popup');
        if (popup) {
          popup.style.animation = 'none';
          popup.style.opacity = '0';
          popup.style.transition = 'opacity 0.3s';
          setTimeout(() => popup.remove(), 300);
        }
        localStorage.setItem('install_popup_dismissed', new Date().toDateString());
      }

      window.addEventListener('appinstalled', () => {
        console.log('✅ Dolphin Trends App installed!');
        closeInstallPopup();
      });
    </script>
  </body>
</html>
